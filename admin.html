<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>至尊披萨（洋湖荟聚店）后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { pizza: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' } } } } };
  </script>
</head>
<body class="min-h-screen bg-orange-50 text-stone-800">
  <main class="mx-auto max-w-4xl px-4 py-8 sm:py-12">
    <header class="mb-7 flex items-center justify-between">
      <div><p class="text-xs font-bold tracking-[.18em] text-pizza-700">SUPREME PIZZA</p><h1 class="mt-1 text-2xl font-bold">后台管理</h1></div>
      <button id="logout" class="hidden rounded-xl border border-stone-200 bg-white px-4 py-2 text-sm font-bold text-stone-600">退出登录</button>
    </header>

    <section id="login-view" class="mx-auto max-w-md rounded-3xl bg-white p-6 shadow-xl shadow-orange-100 sm:p-8">
      <h2 class="text-xl font-bold">管理员登录</h2><p class="mt-2 text-sm text-stone-500">请输入后台管理密码。</p>
      <form id="login-form" class="mt-6 space-y-4"><input id="password" type="password" required autocomplete="current-password" placeholder="管理员密码" class="w-full rounded-2xl border-2 border-stone-100 bg-stone-50 px-4 py-3 outline-none focus:border-pizza-400" /><p id="login-error" class="hidden rounded-xl bg-red-50 px-4 py-3 text-sm text-red-600"></p><button class="w-full rounded-2xl bg-pizza-500 px-5 py-3 font-bold text-white shadow-lg shadow-orange-200 hover:bg-pizza-600">登录</button></form>
    </section>

    <section id="dashboard-view" class="hidden space-y-6">
      <section class="rounded-3xl bg-white p-5 shadow-lg shadow-orange-100 sm:p-7">
        <div class="flex items-center justify-between gap-4"><div><h2 class="text-xl font-bold">图片库统计</h2><p class="mt-1 text-sm text-stone-500">可用图片会被顾客随机选择；冷却图片将在 14 天后重置。</p></div><button id="refresh" class="rounded-xl border-2 border-pizza-100 px-4 py-2 text-sm font-bold text-pizza-700">刷新</button></div>
        <div id="image-stats" class="mt-5 grid gap-3 sm:grid-cols-2"></div>
      </section>

      <section class="rounded-3xl bg-white p-5 shadow-lg shadow-orange-100 sm:p-7">
        <h2 class="text-xl font-bold">上传图片</h2><p class="mt-1 text-sm text-stone-500">支持 JPG、PNG、WebP；单张不超过 5MB，每次最多 10 张。</p>
        <form id="upload-form" class="mt-5 grid gap-4 sm:grid-cols-[1fr_150px_auto] sm:items-end"><label class="block text-sm font-bold">选择图片<input name="images" type="file" accept="image/jpeg,image/png,image/webp" multiple required class="mt-2 block w-full text-sm text-stone-500 file:mr-3 file:rounded-xl file:border-0 file:bg-pizza-50 file:px-3 file:py-2 file:font-bold file:text-pizza-700" /></label><label class="block text-sm font-bold">标签<select name="tag" class="mt-2 w-full rounded-xl border-2 border-stone-100 bg-stone-50 px-3 py-2.5 outline-none focus:border-pizza-400"><option value="口味">口味</option><option value="环境">环境</option></select></label><button class="rounded-2xl bg-pizza-500 px-5 py-3 font-bold text-white shadow-lg shadow-orange-200 hover:bg-pizza-600">上传图片</button></form>
        <p id="upload-message" class="hidden mt-4 rounded-xl px-4 py-3 text-sm"></p>
      </section>

      <section class="rounded-3xl bg-white p-5 shadow-lg shadow-orange-100 sm:p-7">
        <div class="flex items-center justify-between"><div><h2 class="text-xl font-bold">私密反馈</h2><p class="mt-1 text-sm text-stone-500">按提交时间倒序展示。</p></div><span id="feedback-count" class="rounded-full bg-orange-50 px-3 py-1 text-sm font-bold text-pizza-700"></span></div>
        <div id="feedback-list" class="mt-5 space-y-3"></div>
      </section>
    </section>
  </main>

  <script>
    const loginView = document.querySelector('#login-view');
    const dashboardView = document.querySelector('#dashboard-view');
    const logoutButton = document.querySelector('#logout');
    const statsContainer = document.querySelector('#image-stats');
    const feedbackList = document.querySelector('#feedback-list');

    async function api(url, options) {
      const response = await fetch(url, options);
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    function renderStats(rows) {
      const tags = ['口味', '环境'];
      statsContainer.innerHTML = tags.map((tag) => {
        const available = rows.find((row) => row.tag === tag && row.status === 'available')?.count || 0;
        const cooling = rows.find((row) => row.tag === tag && row.status === 'cooling')?.count || 0;
        return `<div class="rounded-2xl bg-stone-50 p-4"><p class="font-bold">${tag}类图片</p><div class="mt-3 flex gap-3 text-sm"><span class="rounded-full bg-green-50 px-3 py-1 text-green-700">available ${available} 张</span><span class="rounded-full bg-orange-50 px-3 py-1 text-pizza-700">cooling ${cooling} 张</span></div></div>`;
      }).join('');
    }

    function renderFeedback(rows) {
      document.querySelector('#feedback-count').textContent = `${rows.length} 条`;
      feedbackList.innerHTML = rows.length ? rows.map((item) => `<article class="rounded-2xl border border-stone-100 bg-stone-50 p-4"><div class="flex flex-wrap items-center justify-between gap-2 text-xs text-stone-400"><span>${new Date(item.created_at + 'Z').toLocaleString('zh-CN')}</span><span class="rounded-full bg-orange-100 px-2 py-1 font-bold text-pizza-700">${item.rating ? `${item.rating} 星` : '历史记录未评分'}</span></div><p class="mt-3 whitespace-pre-wrap text-sm leading-6 text-stone-700"></p></article>`).join('') : '<p class="rounded-2xl bg-stone-50 p-5 text-center text-sm text-stone-400">暂时没有私密反馈</p>';
      rows.forEach((item, index) => { const target = feedbackList.querySelectorAll('article p')[index]; if (target) target.textContent = item.feedback_content; });
    }

    async function loadDashboard() {
      const [stats, feedback] = await Promise.all([api('/api/admin/image-stats'), api('/api/admin/feedback')]);
      renderStats(stats.stats);
      renderFeedback(feedback.feedback);
    }

    async function showDashboard() {
      loginView.classList.add('hidden');
      dashboardView.classList.remove('hidden');
      logoutButton.classList.remove('hidden');
      await loadDashboard();
    }

    document.querySelector('#login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const error = document.querySelector('#login-error');
      error.classList.add('hidden');
      try { await api('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: document.querySelector('#password').value }) }); await showDashboard(); }
      catch (loginError) { error.textContent = loginError.message; error.classList.remove('hidden'); }
    });

    document.querySelector('#upload-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      const message = document.querySelector('#upload-message');
      message.classList.add('hidden');
      try { const data = await api('/api/admin/upload-image', { method: 'POST', body: new FormData(form) }); message.textContent = `成功上传 ${data.uploaded} 张图片`; message.className = 'mt-4 rounded-xl bg-green-50 px-4 py-3 text-sm text-green-700'; form.reset(); renderStats(data.stats); }
      catch (uploadError) { message.textContent = uploadError.message; message.className = 'mt-4 rounded-xl bg-red-50 px-4 py-3 text-sm text-red-600'; }
    });

    document.querySelector('#refresh').addEventListener('click', () => loadDashboard().catch((error) => alert(error.message)));
    logoutButton.addEventListener('click', async () => { await api('/api/admin/logout', { method: 'POST' }); location.reload(); });
    api('/api/admin/check').then(({ authenticated }) => authenticated && showDashboard()).catch(() => {});
  </script>
</body>
</html>
